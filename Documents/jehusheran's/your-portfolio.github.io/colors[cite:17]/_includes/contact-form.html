<!-- _includes/contact-form.html - Formspree Integration (No backend needed) -->
<section class="contact-form-section">
  <div class="container">
    <h2 class="section-title">Get In Touch</h2>
    <p class="section-subtitle">Open to AI/ML internships & research collaborations in Bengaluru 🚀</p>
    
    <!-- Contact Form -->
    <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">
      <!-- Name -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          placeholder="e.g. John Doe" 
          required 
          maxlength="50"
        >
      </div>
      
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="_replyto" 
          placeholder="your.email@example.com" 
          required 
        >
      </div>
      
      <!-- Subject -->
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
          <option value="">Select a subject</option>
          <option value="Internship Opportunity">Internship Opportunity (IBM/Airbus)</option>
          <option value="Research Collaboration">Research Collaboration</option>
          <option value="Project Discussion">Smart Bus IoT Project</option>
          <option value="Freelance Work">Flutter/ML Development</option>
          <option value="Other">Other</option>
        </select>
      </div>
      
      <!-- Message -->
      <div class="form-group">
        <label for="message">Message</label>
        <textarea 
          id="message" 
          name="message" 
          rows="6" 
          placeholder="Tell me about your project/opportunity..." 
          required 
          maxlength="1000"
        ></textarea>
      </div>
      
      <!-- Submit Button -->
      <button type="submit" class="btn-primary" id="submitBtn">
        <span class="btn-text">Send Message</span>
        <span class="btn-loader" style="display: none;">
          <i class="fas fa-spinner fa-spin"></i>
        </span>
      </button>
    </form>
    
    <!-- Success/Error Messages -->
    <div id="formMessage" class="form-message" style="display: none;"></div>
  </div>
</section>

<style>
/* Contact Form Styles - Dark theme matching header/footer */
.contact-form-section {
  padding: 5rem 0;
  background: var(--card-bg);
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 2rem;
}

.section-title {
  font-size: clamp(2rem, 5vw, 3rem);
  color: var(--text);
  text-align: center;
  margin-bottom: 1rem;
}

.section-subtitle {
  color: var(--text-muted);
  text-align: center;
  font-size: 1.2rem;
  margin-bottom: 3rem;
}

.contact-form {
  background: var(--primary-light);
  padding: 3rem;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.form-group {
  margin-bottom: 2rem;
}

.form-group label {
  display: block;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 0.75rem;
  font-size: 0.95rem;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 1rem 1.25rem;
  background: var(--primary);
  border: 2px solid transparent;
  border-radius: 12px;
  color: var(--text);
  font-size: 1rem;
  font-family: inherit;
  transition: all 0.3s ease;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: var(--text-muted);
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  background: var(--primary);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: white;
  border: none;
  padding: 1.25rem 3rem;
  border-radius: 12px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
}

.btn-primary:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

.form-message {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  font-weight: 500;
  text-align: center;
}

.form-message.success {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.3);
}

.form-message.error {
  background: rgba(239, 68, 68, 0.2);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

@media (max-width: 768px) {
  .contact-form {
    padding: 2rem 1.5rem;
  }
  
  .contact-form-section {
    padding: 3rem 0;
  }
}
</style>

<script>
// Form submission handler with loading states
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const form = e.target;
  const submitBtn = document.getElementById('submitBtn');
  const btnText = submitBtn.querySelector('.btn-text');
  const btnLoader = submitBtn.querySelector('.btn-loader');
  const messageDiv = document.getElementById('formMessage');
  
  // Show loading
  submitBtn.disabled = true;
  btnText.style.display = 'none';
  btnLoader.style.display = 'inline-block';
  messageDiv.style.display = 'none';
  
  try {
    const formData = new FormData(form);
    
    const response = await fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    });
    
    if (response.ok) {
      messageDiv.textContent = '✅ Message sent successfully! I\'ll get back to you within 24 hours.';
      messageDiv.className = 'form-message success';
      messageDiv.style.display = 'block';
      form.reset();
    } else {
      throw new Error('Submission failed. Please try again.');
    }
  } catch (error) {
    messageDiv.textContent = '❌ ' + error.message;
    messageDiv.className = 'form-message error';
    messageDiv.style.display = 'block';
  } finally {
    // Reset button
    submitBtn.disabled = false;
    btnText.style.display = 'inline';
    btnLoader.style.display = 'none';
  }
});
</script>
