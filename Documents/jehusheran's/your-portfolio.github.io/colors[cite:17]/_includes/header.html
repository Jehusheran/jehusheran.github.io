<!-- _includes/header.html - Free-to-Engineer Portfolio Template -->
<header class="site-header">
  <div class="nav-container">
    <nav class="navbar" id="navbar">
      <!-- Logo/Profile Link -->
      <a href="{{ site.baseurl }}/" class="nav-logo">
        <img src="{{ site.baseurl }}/assets/img/profile.jpg" alt="{{ site.name }}" class="profile-img-nav">
        <span class="logo-text">{{ site.name }}</span>
      </a>
      
      <!-- Desktop Navigation -->
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="{{ site.baseurl }}/#home" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          <a href="{{ site.baseurl }}/#about" class="nav-link">About</a>
        </li>
        <li class="nav-item">
          <a href="{{ site.baseurl }}/#projects" class="nav-link">Projects</a>
        </li>
        <li class="nav-item">
          <a href="{{ site.baseurl }}/#skills" class="nav-link">Skills</a>
        </li>
        <li class="nav-item">
          <a href="{{ site.baseurl }}/#research" class="nav-link">Research</a>
        </li>
        <li class="nav-item">
          <a href="{{ site.baseurl }}/#contact" class="nav-link">Contact</a>
        </li>
      </ul>
      
      <!-- Mobile Menu Toggle -->
      <div class="hamburger" id="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </nav>
  </div>
</header>

<!-- Mobile Menu Overlay -->
<div class="mobile-menu" id="mobileMenu">
  <ul class="mobile-nav-menu">
    <li><a href="{{ site.baseurl }}/#home">Home</a></li>
    <li><a href="{{ site.baseurl }}/#about">About</a></li>
    <li><a href="{{ site.baseurl }}/#projects">Projects</a></li>
    <li><a href="{{ site.baseurl }}/#skills">Skills</a></li>
    <li><a href="{{ site.baseurl }}/#research">Research</a></li>
    <li><a href="{{ site.baseurl }}/#contact">Contact</a></li>
  </ul>
</div>

<style>
/* Header Styles - Uses CSS vars from head.html */
.site-header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(var(--card-bg), 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--primary-light);
  z-index: 1000;
  transition: all 0.3s ease;
}

.nav-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 70px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  text-decoration: none;
  color: var(--text);
  font-weight: 700;
  font-size: 1.1rem;
}

.profile-img-nav {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--accent);
}

.nav-menu {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
  gap: 2rem;
}

.nav-link {
  color: var(--text-muted);
  text-decoration: none;
  font-weight: 500;
  transition: all 0.2s ease;
  position: relative;
}

.nav-link:hover,
.nav-link.active {
  color: var(--accent);
}

.nav-link::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: width 0.3s ease;
}

.nav-link:hover::after {
  width: 100%;
}

.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
  gap: 4px;
}

.bar {
  width: 25px;
  height: 3px;
  background: var(--text);
  transition: 0.3s;
}

/* Mobile */
@media (max-width: 768px) {
  .nav-menu {
    display: none;
  }
  
  .hamburger {
    display: flex;
  }
  
  .mobile-menu {
    position: fixed;
    top: 70px;
    left: 0;
    width: 100%;
    height: calc(100vh - 70px);
    background: var(--card-bg);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 999;
  }
  
  .mobile-menu.active {
    transform: translateX(0);
  }
  
  .mobile-nav-menu {
    list-style: none;
    padding: 2rem 0;
    margin: 0;
  }
  
  .mobile-nav-menu li {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--primary-light);
  }
  
  .mobile-nav-menu a {
    color: var(--text);
    text-decoration: none;
    font-size: 1.1rem;
  }
}
</style>

<script>
// Mobile menu toggle
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobileMenu');

hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  mobileMenu.classList.toggle('active');
});

// Close mobile menu on link click
document.querySelectorAll('.mobile-nav-menu a').forEach(link => {
  link.addEventListener('click', () => {
    hamburger.classList.remove('active');
    mobileMenu.classList.remove('active');
  });
});

// Navbar scroll effect
window.addEventListener('scroll', () => {
  const header = document.querySelector('.site-header');
  if (window.scrollY > 100) {
    header.style.background = 'rgba(var(--card-bg), 0.98)';
    header.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
  } else {
    header.style.background = 'rgba(var(--card-bg), 0.95)';
    header.style.boxShadow = 'none';
  }
});

// Active nav link on scroll
window.addEventListener('scroll', () => {
  const sections = ['home', 'about', 'projects', 'skills', 'research', 'contact'];
  const scrollPos = window.scrollY + 100;
  
  sections.forEach(section => {
    const el = document.getElementById(section);
    if (el && el.offsetTop <= scrollPos && el.offsetTop + el.offsetHeight > scrollPos) {
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      document.querySelector(`[href="#${section}"]`).classList.add('active');
    }
  });
});
</script>
